<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Vendoor | https://vendoor.com</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">Vendoor</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login" class="btn-login">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create an account</h2>
            <p class="auth-sub">Join Vendoor and start buying or selling</p>

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="e.g. ismael23" value="{{ request.form.get('username', '') }}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="ex: ismael@email.com" value="{{ request.form.get('email', '') }}" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" value="{{ request.form.get('password', '') }}" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" value="{{ request.form.get('confirm_password', '') }}" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">👁</button>
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" name="terms" id="terms" required>
                    <label for="terms">I accept that Vendoor will collect a 5% commission on each completed transaction</label>
                </div>
                <button type="submit" class="btn-submit">Create account</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
        </div>
    </div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
