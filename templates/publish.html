<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier une annonce - Vendoor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">Vendoor</a>
        <div class="nav-links">
            <a href="/">Accueil</a>
            <a href="/logout" class="btn-login">Déconnexion</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
                <h2>Publish a listing</h2>
                <p class="auth-sub">Create your item or service listing</p>

            <form method="POST" action="/publish" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Titre de l'annonce</label>
                    <input type="text" name="title" placeholder="ex: Vente de sac à dos" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" placeholder="Décris ton article ou service" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label>Prix</label>
                    <input type="number" step="0.01" name="price" placeholder="ex: 1500" required>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select name="category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Service">Service</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="type" required>
                        <option value="article">Article</option>
                        <option value="service">Service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Delivery option</label>
                    <div>
                        <label><input type="radio" name="delivery_method" value="delivery" checked> Delivery</label>
                        <label style="margin-left:12px;"><input type="radio" name="delivery_method" value="pickup"> Pickup</label>
                    </div>
                </div>
                <script>
                // show/hide pickup location based on delivery option
                document.addEventListener('DOMContentLoaded', function(){
                    const radios = document.querySelectorAll('input[name="delivery_method"]');
                    const pickupGroup = document.getElementById('pickup_location_group');
                    if(radios){
                        radios.forEach(r=> r.addEventListener('change', ()=>{
                            if(document.querySelector('input[name="delivery_method"]:checked').value === 'pickup'){
                                pickupGroup.style.display = 'block';
                            } else {
                                pickupGroup.style.display = 'none';
                            }
                        }));
                    }
                });
                </script>
                <div class="form-group" id="pickup_location_group" style="display:none;">
                    <label>Pickup location</label>
                    <input type="text" name="pickup_location" placeholder="Enter pickup location (e.g. campus building)">
                </div>
                <div class="form-group">
                    <label>Image (URL)</label>
                    <input type="url" name="image" placeholder="Image URL (or leave empty to upload)">
                </div>
                <div class="form-group">
                    <label>OU importer une image</label>
                    <input type="file" name="image_file" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Promotion (%)</label>
                    <input type="number" step="1" name="promo" placeholder="ex: 10" value="0">
                </div>
                <button type="submit" class="btn-submit">Publier</button>
            </form>
        </div>
    </div>

</body>
</html>
