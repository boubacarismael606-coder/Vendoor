<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Listing - Vendoor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">Vendoor</a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/posts">Listings</a>
            <a href="/my_listings">My Listings</a>
            <a href="/profile">Profile</a>

            {% if session.get('role') == 'admin' %}
                <a href="/admin" class="btn-signup">Admin</a>
            {% endif %}

            <a href="/logout" class="btn-login">Logout</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">

            <h2>Publish a Listing</h2>
            <p class="auth-sub">Create your product or service listing</p>

            {% if error %}
                <div class="error-message"
                     style="margin-bottom:16px;padding:12px;background:#f8d7da;color:#842029;border-radius:8px;">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST"
                  action="/publish"
                  enctype="multipart/form-data">

                <div class="form-group">
                    <label>Listing Title</label>
                    <input
                        type="text"
                        name="title"
                        placeholder="e.g. Backpack for sale"
                        value="{{ request.form.title or '' }}"
                        required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea
                        name="description"
                        placeholder="Describe your product or service"
                        rows="5"
                        required>{{ request.form.description or '' }}</textarea>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input
                        type="number"
                        step="0.01"
                        name="price"
                        placeholder="e.g. 1500"
                        value="{{ request.form.price or '' }}"
                        required>
                </div>

                <div class="form-group">
                    <label>Category</label>

                    <select name="category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Service">Service</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Type</label>

                    <select name="type" required>

                        <option value="article"
                            {% if request.form.type == 'article' %}
                            selected
                            {% endif %}>
                            Product
                        </option>

                        <option value="service"
                            {% if request.form.type == 'service' %}
                            selected
                            {% endif %}>
                            Service
                        </option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Delivery Option</label>

                    <div>
                        <label>
                            <input
                                type="radio"
                                name="delivery_method"
                                value="delivery"
                                checked>
                            Delivery
                        </label>

                        <label style="margin-left:12px;">
                            <input
                                type="radio"
                                name="delivery_method"
                                value="pickup">
                            Pickup
                        </label>
                    </div>
                </div>

                <!-- BUG FIXED HERE -->

                <div
                    class="form-group"
                    id="pickup_location_group"
                    style="{% if request.form.delivery_method == 'pickup' %}display:block;{% else %}display:none;{% endif %}">

                    <label>Pickup Location</label>

                    <input
                        type="text"
                        name="pickup_location"
                        placeholder="Enter pickup location (e.g. campus building)"
                        value="{{ request.form.pickup_location or '' }}">
                </div>

                <div class="form-group">
                    <label>Image URL</label>

                    <input
                        type="url"
                        name="image"
                        placeholder="Image URL (or leave empty to upload)"
                        value="{{ request.form.image or '' }}">
                </div>

                <div class="form-group">
                    <label>Or Upload an Image</label>

                    <input
                        type="file"
                        name="image_file"
                        accept="image/*">
                </div>

                <div class="form-group">
                    <label>Promotion (%)</label>

                    <input
                        type="number"
                        step="1"
                        name="promo"
                        placeholder="e.g. 10"
                        value="{{ request.form.promo or 0 }}">
                </div>

                <button type="submit" class="btn-submit">
                    Publish
                </button>

            </form>

        </div>
    </div>

    <script>

    document.addEventListener('DOMContentLoaded', function () {

        const radios =
            document.querySelectorAll(
                'input[name="delivery_method"]'
            );

        const pickupGroup =
            document.getElementById(
                'pickup_location_group'
            );

        radios.forEach(radio => {

            radio.addEventListener(
                'change',
                () => {

                    const selected =
                        document.querySelector(
                            'input[name="delivery_method"]:checked'
                        ).value;

                    pickupGroup.style.display =
                        selected === 'pickup'
                        ? 'block'
                        : 'none';

                }
            );

        });

    });

    </script>

</body>
</html>
