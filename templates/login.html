<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vendoor | https://vendoor.com</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">Vendoor</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register" class="btn-signup">Sign up</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Log in</h2>
            <p class="auth-sub">Access your Vendoor account</p>

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="e.g. ismael@email.com" value="{{ request.form.get('email', '') }}" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login_password" name="password" placeholder="Your password" value="{{ request.form.get('password', '') }}" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login_password')">👁</button>
                    </div>
                </div>
                <p style="text-align:right; margin-bottom:12px;"><a href="/forgot_password" style="font-size:13px; color:#e63946;">Forgot password?</a></p>
                <button type="submit" class="btn-submit">Connexion</button>
            </form>

            <p class="auth-footer">No account yet? <a href="/register">Sign up</a></p>
        </div>
    </div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
